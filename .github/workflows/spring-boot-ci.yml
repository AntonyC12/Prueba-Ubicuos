name: Integracion Continua - Evaluacion UCE

on:
  push:
    branches: [ "main", "Dev" ]
  pull_request:
    branches: [ "main", "Dev" ]

#Definir trabajos 
jobs:
  build:
    name: Compilar y Verificar
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./evaluacion-backend

    steps:
    - name: Clonar código
      uses: actions/checkout@v3

    - name: Configurar Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven 

    - name: Dar permisos de ejecución a Maven
      run: chmod +x mvnw

    - name: Construir proyecto con Maven
      run: ./mvnw clean package