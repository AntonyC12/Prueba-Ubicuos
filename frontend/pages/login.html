<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Sistema de Evaluación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --primary-hover: #1e293b; --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #334155; --text-muted: #64748b; --border: #e2e8f0; --error-bg: #fef2f2; --error-text: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-wrapper { width: 100%; max-width: 400px; }
        .login-card { background-color: var(--card-bg); padding: 40px 30px; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h2 { color: var(--primary); font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .login-header p { color: var(--text-muted); font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: var(--text-main); margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px 15px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px; outline: none; transition: all 0.3s ease; color: var(--text-main); }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1); }
        .btn-submit { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; cursor: pointer; transition: background-color 0.3s ease; margin-top: 10px; }
        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:disabled { background-color: var(--text-muted); cursor: not-allowed; }
        .error-message { background-color: var(--error-bg); color: var(--error-text); padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; display: none; text-align: center; border: 1px solid #fca5a5; }
        
        .register-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
        .register-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h2>Acceso del estudiante</h2>
                <p>Ingresa tu Credencial para continuar</p>
            </div>
            
            <div id="mensajeError" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="credencialEmail">Correo Electrónico de la Credencial</label>
                    <input type="email" id="credencialEmail" placeholder="usuario@uce.edu.ec" required>
                </div>
                
                <div class="form-group">
                    <label for="credencialPassword">Contraseña de la Credencial</label>
                    <input type="password" id="credencialPassword" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-submit" id="btnIngresar">Iniciar Sesión</button>
            </form>

            <div class="register-link">
                ¿No estás registrado? <a href="registro.html">Crea tu cuenta como Evaluado</a>
            </div>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
