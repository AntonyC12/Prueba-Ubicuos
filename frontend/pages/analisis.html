<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado | Sistema de Evaluación</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0f172a;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --success: #16a34a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-bottom: 20px;
            color: var(--primary);
        }

        .resultado {
            font-size: 18px;
            margin: 10px 0;
        }

        .nota {
            font-size: 40px;
            font-weight: bold;
            color: var(--success);
        }

        .btn {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Resultado del Examen</h2>

        <div class="resultado" id="puntaje"></div>
        <div class="nota" id="nota"></div>
        <div class="resultado" id="nivel"></div>

        <button class="btn" onclick="volver()">Finalizar</button>
    </div>

    <script src="../js/analisis.js"></script>
</body>

</html>
